services:
  - type: web
    name: hibaru-reading-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://hibaru-reading-program.netlify.app
      # Secrets below are intentionally left blank in this file (sync: false
      # means Render prompts for them during setup and stores them only in
      # its own dashboard — never in this repo).
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MASTER_ADMIN_USERNAME
        sync: false
      - key: MASTER_ADMIN_PASSWORD
        sync: false
      # Turso (remote libSQL) connection — without these two, the server
      # falls back to a local SQLite file, which does NOT survive a Render
      # redeploy. Set these to make the database persistent. See DEPLOY.md.
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
