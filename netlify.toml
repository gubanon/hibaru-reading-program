[build]
  base = "client"
  command = "npm run build"
  # Relative to `base` on Netlify CI (resolves to client/dist). The CLI
  # resolves publish from the repo root instead — for a manual deploy, pass
  # --dir client/dist explicitly rather than relying on this value.
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
